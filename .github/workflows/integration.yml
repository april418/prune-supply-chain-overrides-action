name: Integration (self-test)

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Mondays at 03:00 UTC.
    - cron: '0 3 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  self-prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run prune-supply-chain-overrides-action on this repo
        uses: ./
        with:
          working-directory: .
          dry-run: 'true'
